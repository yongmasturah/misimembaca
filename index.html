<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Larian Angkasa: Misi Diftong & Digraf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .overlay {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }
        .hidden { display: none !important; }
        .heart {
            font-size: 2rem;
            filter: drop-shadow(0 0 5px rgba(0, 168, 255, 0.5));
        }
        .word-display {
            font-size: 4rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-finish {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4);
            transition: all 0.2s;
        }
        .btn-finish:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <!-- Status Bar -->
        <div class="flex justify-between items-start p-4">
            <div class="bg-black/50 p-2 rounded-lg border border-blue-500/50">
                <p class="text-blue-400 text-xs uppercase font-bold tracking-widest">Skor</p>
                <p id="score-val" class="text-white text-2xl font-mono">0</p>
            </div>
            <div class="flex gap-2" id="lives-container">
                <!-- Nyawa akan dijana di sini -->
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay absolute inset-0">
            <h1 class="text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic">LARIAN ANGKASA</h1>
            <p class="text-gray-300 mb-8 max-w-xs">Elak asteroid dan baca perkataan untuk teruskan misi! <br> Gunakan <b>Anak Panah</b> atau <b>Leret (Swipe)</b>.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-full font-bold text-xl shadow-lg shadow-blue-900/50 transition-all">MULA MISI</button>
        </div>

        <!-- Reading Screen -->
        <div id="refuel-screen" class="overlay absolute inset-0 hidden">
            <div class="bg-gray-900 border-2 border-green-500 p-8 rounded-3xl max-w-md w-full shadow-2xl">
                <div class="mb-4">
                    <span class="text-5xl">📖</span>
                </div>
                <h2 class="text-xl font-bold mb-2 text-green-400 uppercase tracking-widest">Sila Baca Perkataan Ini:</h2>
                
                <div id="target-word" class="word-display">
                    PANDAI
                </div>
                
                <p class="text-gray-400 mb-8 italic">Baca dengan kuat untuk mengisi semula perisai roket!</p>

                <button onclick="completeReading()" class="btn-finish w-full py-5 rounded-2xl text-xl font-black text-white uppercase tracking-widest">
                    SELESAI MEMBACA
                </button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- SISTEM BUNYI (Audio Engine) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmInterval = null;

        function playSound(freq, type, duration, volume = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Kesan bunyi pelanggaran (thud)
        function playHitSound() {
            playSound(150, 'sawtooth', 0.5, 0.2);
            playSound(100, 'sine', 0.3, 0.3);
        }

        // Kesan bunyi perkataan muncul (chime)
        function playWordPopSound() {
            playSound(523.25, 'sine', 0.5, 0.2); // C5
            setTimeout(() => playSound(659.25, 'sine', 0.5, 0.2), 100); // E5
        }

        // Kesan bunyi selesai membaca (success)
        function playSuccessSound() {
            playSound(523.25, 'triangle', 0.3, 0.2);
            setTimeout(() => playSound(659.25, 'triangle', 0.3, 0.2), 100);
            setTimeout(() => playSound(783.99, 'triangle', 0.5, 0.2), 200);
        }

        // Muzik latar ringkas
        function startBGM() {
            if (bgmInterval) return;
            const playNote = () => {
                if (gameState !== 'PLAYING') return;
                playSound(110, 'sine', 0.4, 0.05); // Bass pulse
                setTimeout(() => {
                    if (gameState === 'PLAYING') playSound(220, 'sine', 0.2, 0.03);
                }, 400);
            };
            playNote();
            bgmInterval = setInterval(playNote, 800);
        }

        function stopBGM() {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }

        // --- LOGIK PERMAINAN ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');
        const livesContainer = document.getElementById('lives-container');
        const refuelScreen = document.getElementById('refuel-screen');
        const targetWordDisplay = document.getElementById('target-word');

        const masterWordsList = [
            "tupai", "pantai", "aurat", "kerbau", "kaloi", "amboi", 
            "yang", "bunga", "khabar", "khemah", "syukur", "nasyid", 
            "penyu", "minyak", "daun", "kain", "piano", "radio", "saat"
        ];

        let wordsPool = [];
        let gameState = 'START';
        let score = 0;
        let lives = 2;
        let player = { x: 0, y: 0, lane: 1, width: 60, height: 80, targetX: 0 };
        let obstacles = [];
        let stars = [];
        let lastTime = 0;
        let obstacleTimer = 0;
        let gameSpeed = 5;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height - 120;
            updatePlayerX();
        }

        window.addEventListener('resize', resize);
        resize();

        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 1
            });
        }

        function updatePlayerX() {
            const laneWidth = canvas.width / 3;
            player.targetX = (player.lane * laneWidth) + (laneWidth / 2) - (player.width / 2);
            if (gameState === 'START') player.x = player.targetX;
        }

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING') return;
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
            updatePlayerX();
        });

        let touchStartX = 0;
        window.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        window.addEventListener('touchend', e => {
            if (gameState !== 'PLAYING') return;
            let touchEndX = e.changedTouches[0].clientX;
            let diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 30) {
                if (diff < 0 && player.lane > 0) player.lane--;
                else if (diff > 0 && player.lane < 2) player.lane++;
                updatePlayerX();
            }
        });

        function refreshWordsPool() {
            wordsPool = [...masterWordsList].sort(() => Math.random() - 0.5);
        }

        function getNextWord() {
            if (wordsPool.length === 0) refreshWordsPool();
            return wordsPool.pop();
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').classList.add('hidden');
            gameState = 'PLAYING';
            score = 0;
            lives = 2;
            obstacles = [];
            gameSpeed = 5;
            scoreVal.innerText = "0";
            updateLivesUI();
            refreshWordsPool();
            startBGM();
            requestAnimationFrame(gameLoop);
        }

        function updateLivesUI() {
            livesContainer.innerHTML = '';
            for(let i=0; i<2; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerHTML = i < lives ? '🛡️' : '🔘';
                livesContainer.appendChild(heart);
            }
        }

        function triggerRefuel() {
            stopBGM();
            gameState = 'REFUEL';
            const word = getNextWord();
            targetWordDisplay.innerText = word;
            refuelScreen.classList.remove('hidden');
            playWordPopSound();
        }

        function completeReading() {
            playSuccessSound();
            setTimeout(() => {
                lives = 2;
                updateLivesUI();
                refuelScreen.classList.add('hidden');
                gameState = 'PLAYING';
                obstacles = [];
                lastTime = performance.now();
                startBGM();
                requestAnimationFrame(gameLoop);
            }, 300);
        }

        function createObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const laneWidth = canvas.width / 3;
            obstacles.push({
                x: (lane * laneWidth) + (laneWidth/2) - 30,
                y: -100,
                width: 60,
                height: 60
            });
        }

        function drawRocket(x, y) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0, 168, 255, 0.5)';
            ctx.fillStyle = '#f1f2f6';
            ctx.beginPath();
            ctx.moveTo(x + 30, y);
            ctx.lineTo(x + 60, y + 60);
            ctx.lineTo(x + 50, y + 80);
            ctx.lineTo(x + 10, y + 80);
            ctx.lineTo(x, y + 60);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2f3542';
            ctx.beginPath();
            ctx.arc(x + 30, y + 40, 10, 0, Math.PI * 2);
            ctx.fill();

            if (gameState === 'PLAYING') {
                ctx.fillStyle = Math.random() > 0.5 ? '#ff4757' : '#ffa502';
                ctx.beginPath();
                ctx.moveTo(x + 20, y + 80);
                ctx.lineTo(x + 30, y + 105 + Math.random() * 10);
                ctx.lineTo(x + 40, y + 80);
                ctx.fill();
            }

            if (lives > 0) {
                ctx.strokeStyle = `rgba(0, 168, 255, ${0.4 + Math.sin(Date.now()/150)*0.2})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x + 30, y + 40, 55, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        function drawAsteroid(x, y) {
            ctx.fillStyle = '#4b5563';
            ctx.beginPath();
            ctx.moveTo(x + 10, y);
            ctx.lineTo(x + 50, y + 5);
            ctx.lineTo(x + 60, y + 30);
            ctx.lineTo(x + 45, y + 55);
            ctx.lineTo(x + 15, y + 60);
            ctx.lineTo(x, y + 35);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#1f2937';
            ctx.beginPath();
            ctx.arc(x+20, y+20, 6, 0, Math.PI*2);
            ctx.fill();
        }

        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });

            player.x += (player.targetX - player.x) * 0.15;

            obstacleTimer += deltaTime;
            if (obstacleTimer > (1400 / (gameSpeed/5))) {
                createObstacle();
                obstacleTimer = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += gameSpeed;
                drawAsteroid(obs.x, obs.y);

                if (
                    player.x < obs.x + 50 &&
                    player.x + player.width > obs.x + 10 &&
                    player.y < obs.y + 50 &&
                    player.y + player.height > obs.y + 10
                ) {
                    obstacles.splice(i, 1);
                    lives--;
                    updateLivesUI();
                    playHitSound(); // MAIN BUNYI PELANGGARAN
                    if (lives <= 0) {
                        triggerRefuel();
                        return;
                    }
                    continue;
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score += 10;
                    scoreVal.innerText = score;
                    gameSpeed += 0.015;
                }
            }

            drawRocket(player.x, player.y);
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
