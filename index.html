<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misi Penyelamat Rimba: Sang Kancil Bijak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a2e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #228B22 100%);
        }
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .overlay {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }
        .hidden { display: none !important; }
        .heart {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5));
        }
        /* Style untuk Suku Kata */
        .syllable-slot {
            min-width: 60px;
            height: 60px;
            border: 3px dashed #fbbf24;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            margin: 0 8px;
            padding: 0 10px;
            color: #fbbf24;
        }
        .syllable-btn {
            min-width: 60px;
            height: 60px;
            background: #fbbf24;
            color: #1a2e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b45309;
            transition: all 0.1s;
            margin: 0 5px;
            padding: 0 15px;
        }
        .syllable-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .final-word {
            font-size: 4rem;
            font-weight: 900;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            margin: 20px 0;
        }
        .control-btn {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <!-- Status Bar -->
        <div class="flex justify-between items-start p-4">
            <div class="bg-black/50 p-2 rounded-xl border border-green-500/50">
                <p class="text-green-400 text-[10px] uppercase font-bold tracking-widest">Jarak</p>
                <p id="score-val" class="text-white text-xl font-mono">0m</p>
            </div>
            <div class="flex gap-2" id="lives-container">
                <!-- Hati dijana di sini -->
            </div>
        </div>

        <!-- Touch Controls -->
        <div class="absolute bottom-10 left-10 flex gap-4">
            <div class="control-btn" id="btn-left">⬅️</div>
            <div class="control-btn" id="btn-right">➡️</div>
        </div>
        <div class="absolute bottom-10 right-10">
            <div class="control-btn w-20 h-20 bg-blue-500/50" id="btn-jump">⬆️</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay absolute inset-0">
            <div class="mb-6 animate-bounce">
                <span class="text-8xl">🦌</span>
            </div>
            <h1 class="text-4xl font-black mb-2 text-green-400 italic">MISI PENYELAMAT RIMBA</h1>
            <p class="text-gray-300 mb-8 max-w-xs">Bantu Sang Kancil merentasi hutan. Elak lubang dan labah-labah!</p>
            <button onclick="startGame()" class="bg-green-600 hover:bg-green-500 px-10 py-4 rounded-full font-bold text-xl shadow-lg transition-all">MULA KEMBARA</button>
        </div>

        <!-- Peti Ajaib (Recovery Screen) -->
        <div id="recovery-screen" class="overlay absolute inset-0 hidden">
            <div class="bg-amber-900 border-4 border-amber-500 p-6 md:p-10 rounded-[2rem] max-w-2xl w-full shadow-2xl">
                <div class="mb-4">
                    <span class="text-6xl">🎁</span>
                </div>
                <h2 class="text-2xl font-black text-amber-400 uppercase tracking-widest mb-1">PETI AJAIB</h2>
                <p id="instruction-text" class="text-gray-300 text-sm mb-6">Susun suku kata dengan betul untuk dapatkan nyawa!</p>
                
                <!-- Syllable Slots -->
                <div id="syllable-slots" class="flex justify-center mb-8 flex-wrap gap-y-4"></div>
                
                <!-- Scrambled Syllable Options -->
                <div id="syllable-options" class="flex justify-center gap-3 mb-8 flex-wrap"></div>

                <!-- Final Word Display (Hidden initially) -->
                <div id="final-word-display" class="hidden final-word animate-bounce"></div>

                <div id="feedback" class="h-8 text-lg font-bold mb-6"></div>

                <div class="flex flex-col gap-3">
                    <button id="btn-finish-reading" onclick="finishReading()" class="hidden bg-green-600 hover:bg-green-500 px-8 py-4 rounded-xl font-black text-xl shadow-lg transition-all">
                        SELESAI MEMBACA & SAMBUNG
                    </button>
                    
                    <button id="btn-reset" onclick="resetRecovery()" class="text-amber-500 text-xs underline uppercase tracking-widest">Padam & Cuba Lagi</button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const wordsData = [
            { word: "tupai", syllables: ["tu", "pai"] },
            { word: "pantai", syllables: ["pan", "tai"] },
            { word: "aurat", syllables: ["au", "rat"] },
            { word: "kerbau", syllables: ["ker", "bau"] },
            { word: "kaloi", syllables: ["ka", "loi"] },
            { word: "amboi", syllables: ["am", "boi"] },
            { word: "yang", syllables: ["yang"] },
            { word: "bunga", syllables: ["bu", "nga"] },
            { word: "khabar", syllables: ["kha", "bar"] },
            { word: "khemah", syllables: ["khe", "mah"] },
            { word: "syukur", syllables: ["syu", "kur"] },
            { word: "nasyid", syllables: ["na", "syid"] },
            { word: "penyu", syllables: ["pe", "nyu"] },
            { word: "minyak", syllables: ["mi", "nyak"] },
            { word: "daun", syllables: ["da", "un"] },
            { word: "kain", syllables: ["ka", "in"] },
            { word: "piano", syllables: ["pi", "a", "no"] },
            { word: "radio", syllables: ["ra", "di", "o"] },
            { word: "saat", syllables: ["sa", "at"] }
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, type, dur, vol=0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-val');
        const livesContainer = document.getElementById('lives-container');
        const recoveryScreen = document.getElementById('recovery-screen');
        const syllableSlots = document.getElementById('syllable-slots');
        const syllableOptions = document.getElementById('syllable-options');
        const feedback = document.getElementById('feedback');
        const btnFinish = document.getElementById('btn-finish-reading');
        const finalWordDisplay = document.getElementById('final-word-display');
        const instructionText = document.getElementById('instruction-text');
        const btnReset = document.getElementById('btn-reset');

        let gameState = 'START';
        let score = 0;
        let lives = 2;
        let worldX = 0;
        let lastTime = 0;
        let player = { x: 100, y: 0, w: 50, h: 50, vy: 0, speed: 5, jumpForce: -15, grounded: false };
        let platforms = [];
        let enemies = [];
        let selectedWordObj = null;
        let currentGuess = [];

        const keys = { left: false, right: false, up: false };
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === ' ') keys.up = true;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === ' ') keys.up = false;
        });

        const bindTouch = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        bindTouch('btn-left', 'left');
        bindTouch('btn-right', 'right');
        bindTouch('btn-jump', 'up');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameState === 'START') initLevel();
        }
        window.addEventListener('resize', resize);
        resize();

        function initLevel() {
            platforms = [{ x: 0, y: canvas.height - 100, w: 800, h: 100 }];
            enemies = [];
            worldX = 0;
            player.x = 100;
            player.y = canvas.height - 200;
            player.vy = 0;
            for(let i=0; i<10; i++) addPlatform();
        }

        function addPlatform() {
            const last = platforms[platforms.length - 1];
            const gap = 120 + Math.random() * 80;
            const width = 200 + Math.random() * 300;
            const y = canvas.height - (100 + Math.random() * 150);
            const newPlat = { x: last.x + last.w + gap, y: y, w: width, h: 400 };
            platforms.push(newPlat);
            if (Math.random() > 0.6) {
                enemies.push({ x: newPlat.x + 50, y: newPlat.y - 30, w: 30, h: 30, range: width - 60, startx: newPlat.x + 50, dir: 1, speed: 2 });
            }
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').classList.add('hidden');
            gameState = 'PLAYING';
            lives = 2;
            score = 0;
            initLevel();
            updateLivesUI();
            requestAnimationFrame(gameLoop);
        }

        function updateLivesUI() {
            livesContainer.innerHTML = '';
            for(let i=0; i<2; i++) {
                const h = document.createElement('span');
                h.className = 'heart';
                h.innerHTML = i < lives ? '❤️' : '🖤';
                livesContainer.appendChild(h);
            }
        }

        function triggerRecovery() {
            gameState = 'RECOVERY';
            recoveryScreen.classList.remove('hidden');
            btnFinish.classList.add('hidden');
            finalWordDisplay.classList.add('hidden');
            syllableSlots.classList.remove('hidden');
            syllableOptions.classList.remove('hidden');
            instructionText.innerText = "Susun suku kata dengan betul untuk dapatkan nyawa!";
            btnReset.classList.remove('hidden');
            
            selectedWordObj = wordsData[Math.floor(Math.random() * wordsData.length)];
            playNote(400, 'sine', 0.5);
            resetRecovery();
        }

        function resetRecovery() {
            currentGuess = [];
            feedback.innerText = "";
            btnFinish.classList.add('hidden');
            finalWordDisplay.classList.add('hidden');
            syllableSlots.classList.remove('hidden');
            syllableOptions.classList.remove('hidden');
            renderRecoveryUI();
        }

        function renderRecoveryUI() {
            syllableSlots.innerHTML = '';
            selectedWordObj.syllables.forEach((_, i) => {
                const slot = document.createElement('div');
                slot.className = 'syllable-slot';
                slot.innerText = currentGuess[i] || "";
                syllableSlots.appendChild(slot);
            });

            syllableOptions.innerHTML = '';
            const shuffled = [...selectedWordObj.syllables].sort(() => Math.random() - 0.5);
            shuffled.forEach(syl => {
                const btn = document.createElement('div');
                btn.className = 'syllable-btn';
                btn.innerText = syl;
                btn.onclick = () => selectSyllable(syl, btn);
                syllableOptions.appendChild(btn);
            });
        }

        function selectSyllable(syl, btn) {
            if (currentGuess.length < selectedWordObj.syllables.length) {
                currentGuess.push(syl);
                btn.style.visibility = 'hidden';
                playNote(600 + (currentGuess.length * 50), 'triangle', 0.1);
                
                const slots = syllableSlots.children;
                slots[currentGuess.length - 1].innerText = syl;

                if (currentGuess.length === selectedWordObj.syllables.length) {
                    checkAnswer();
                }
            }
        }

        function checkAnswer() {
            const isCorrect = currentGuess.every((val, index) => val === selectedWordObj.syllables[index]);
            
            if (isCorrect) {
                playNote(800, 'sine', 0.5);
                
                // Sembunyikan slot susunan & pilihan
                syllableSlots.classList.add('hidden');
                syllableOptions.classList.add('hidden');
                btnReset.classList.add('hidden');
                
                // Tunjukkan perkataan penuh
                finalWordDisplay.innerText = selectedWordObj.word;
                finalWordDisplay.classList.remove('hidden');
                
                instructionText.innerText = "Sila baca perkataan ini:";
                feedback.innerText = "HEBAT! Mari sambung larian.";
                feedback.className = "h-8 text-lg font-bold mb-6 text-green-400";
                
                btnFinish.classList.remove('hidden');
            } else {
                feedback.innerText = "SALAH! Cuba susun semula.";
                feedback.className = "h-8 text-lg font-bold mb-6 text-red-400";
                playNote(200, 'sawtooth', 0.3);
                setTimeout(resetRecovery, 1200);
            }
        }

        function finishReading() {
            playNote(1000, 'sine', 0.3);
            recoveryScreen.classList.add('hidden');
            lives = 2;
            updateLivesUI();
            initLevel(); 
            gameState = 'PLAYING';
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (keys.left) player.x -= player.speed;
            if (keys.right) player.x += player.speed;
            player.vy += 0.8; 
            player.y += player.vy;
            player.grounded = false;

            platforms.forEach(p => {
                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                    if (player.vy > 0) { player.grounded = true; player.vy = 0; player.y = p.y - player.h; }
                }
            });

            if (player.grounded && keys.up) {
                player.vy = player.jumpForce;
                playNote(300, 'square', 0.1, 0.05);
            }

            if (player.x > worldX + canvas.width / 2) worldX = player.x - canvas.width / 2;
            if (player.y > canvas.height) handleDeath();

            enemies.forEach(e => {
                e.x += e.dir * e.speed;
                if (e.x > e.startx + e.range || e.x < e.startx) e.dir *= -1;
                if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) handleDeath();
            });

            if (platforms[platforms.length - 1].x < worldX + canvas.width + 500) addPlatform();

            score = Math.floor(player.x / 50);
            scoreDisplay.innerText = score + "m";

            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleDeath() {
            lives--;
            updateLivesUI();
            playNote(150, 'sawtooth', 0.4);
            if (lives <= 0) triggerRecovery();
            else { player.y = canvas.height - 400; player.vy = 0; player.x = worldX + 100; }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-worldX, 0);

            ctx.fillStyle = '#5d4037';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#2e7d32';
                ctx.fillRect(p.x, p.y, p.w, 15);
                ctx.fillStyle = '#5d4037';
            });

            ctx.fillStyle = '#000';
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'red';
                ctx.fillRect(e.x + 5, e.y + 10, 4, 4);
                ctx.fillRect(e.x + 20, e.y + 10, 4, 4);
                ctx.fillStyle = '#000';
            });

            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            ctx.scale(-1, 1);
            ctx.font = '50px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🦌', 0, 0);
            ctx.restore();

            ctx.restore();
        }
    </script>
</body>
</html>
